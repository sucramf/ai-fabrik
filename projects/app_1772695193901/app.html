    margin-top: 1rem;

</style>
</head>
<body>
<header>
  <h1>Automated Meeting Summary Generator</h1>
  <p>Paste your meeting transcription below to get a concise summary and action items.</p>
</header>
<main>
  <label for="transcription">Meeting Transcription</label>
  <textarea id="transcription" placeholder="Paste your meeting transcription or typed notes here..."></textarea>
  <button id="generateBtn" disabled>Generate Summary</button>
  <div id="loading" style="display:none;">Generating summary, please wait...</div>
  <div id="summary" aria-live="polite" aria-atomic="true"></div>
</main>
<div class="footer">
  &copy; 2024 Automated Meeting Summary Generator
</div>

<script>
  const transcriptionEl = document.getElementById('transcription');
  const generateBtn = document.getElementById('generateBtn');
  const summaryEl = document.getElementById('summary');
  const loadingEl = document.getElementById('loading');

  // Enable button if there is text
  transcriptionEl.addEventListener('input', () => {
    generateBtn.disabled = !transcriptionEl.value.trim();
    summaryEl.textContent = '';
  });

  // Simple "AI-powered" summarization mock function:
  //  - extracts key sentences containing keywords like "decide", "action", "next", "task", "follow-up"
  //  - summarizes into bullet points and highlights action items
  function generateSummary(text) {
    const sentences = text.match(/[^\.!\?]+[\.!\?]+/g) || [];
    const keywords = ['decide', 'decided', 'action', 'actions', 'task', 'tasks', 'follow-up', 'next step', 'deadline', 'assign', 'responsible', 'due'];
    // Extract sentences with keywords
    let keyPoints = sentences.filter(sentence =>
      keywords.some(kw => sentence.toLowerCase().includes(kw))
    );

    // If no key points found, take some important-looking sentences from the start
    if (keyPoints.length === 0) {
      keyPoints = sentences.slice(0, Math.min(5, sentences.length));
    }

    // Compose summary
    let summary = 'Meeting Summary:\n\n';
    summary += keyPoints.map((s, i) => `${i + 1}. ${s.trim()}`).join('\n');

    // Extract action items
    let actions = keyPoints.filter(sentence =>
      /action|task|follow-up|assign|responsible|due|deadline/gi.test(sentence));
    actions = actions.map(a => a.trim());
    if (actions.length > 0) {
      summary += '\n\nAction Items:\n\n';
      summary += actions.map((a, i) => `- ${a}`).join('\n');
    } else {
      summary += '\n\nNo explicit action items found.';
    }

    return summary;
  }

  generateBtn.addEventListener('click', () => {
    const text = transcriptionEl.value.trim();
    if (!text) return;

    loadingEl.style.display = 'block';
    summaryEl.textContent = '';

    // Simulate AI processing delay
    setTimeout(() => {
      const summary = generateSummary(text);
      summaryEl.textContent = summary;
      loadingEl.style.display = 'none';
    }, 1500);
  });
</script>
</body>
</html>

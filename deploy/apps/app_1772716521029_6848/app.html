```html
<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Daily Affirmations Generator</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');
    html, body {
      font-family: 'Inter', sans-serif;
    }
  </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-purple-600 via-indigo-700 to-blue-700 flex flex-col justify-center items-center px-4 py-12 text-slate-50">
  <main class="w-full max-w-xl bg-slate-900/90 backdrop-blur-md rounded-2xl p-8 shadow-lg">
    <header class="mb-8 text-center">
      <h1 class="text-4xl font-extrabold tracking-tight mb-2">Daily Affirmations Generator</h1>
      <p class="text-indigo-300 max-w-md mx-auto">Boost your mindset & productivity with personalized positive affirmations delivered every morning.</p>
    </header>

    <form id="affirmationForm" class="space-y-6" autocomplete="off" spellcheck="false" novalidate>
      <div>
        <label for="mood" class="block mb-2 font-semibold text-lg">How are you feeling right now?</label>
        <input type="text" id="mood" name="mood" required placeholder="e.g. anxious, hopeful, tired" 
               class="w-full rounded-md border-0 py-3 px-4 text-slate-900 text-lg focus:outline-none focus:ring-4 focus:ring-indigo-400" />
      </div>
      <div>
        <label for="goals" class="block mb-2 font-semibold text-lg">What are your focus areas or goals today?</label>
        <input type="text" id="goals" name="goals" required placeholder="e.g. finish project, stay calm, be confident" 
               class="w-full rounded-md border-0 py-3 px-4 text-slate-900 text-lg focus:outline-none focus:ring-4 focus:ring-indigo-400" />
      </div>
      <div>
        <label for="delivery" class="block mb-2 font-semibold text-lg">How would you like to receive your affirmation?</label>
        <select id="delivery" name="delivery" required
                class="w-full rounded-md border-0 py-3 px-4 text-slate-900 text-lg focus:outline-none focus:ring-4 focus:ring-indigo-400">
          <option value="" disabled selected>Select delivery method</option>
          <option value="email">Email (coming soon)</option>
          <option value="app">App Notification (coming soon)</option>
          <option value="here">Display Here Instantly</option>
        </select>
      </div>
      <button type="submit" 
              class="w-full bg-indigo-500 hover:bg-indigo-600 transition rounded-lg py-3 text-white text-xl font-bold shadow-md shadow-indigo-700/50">
        Generate Affirmation
      </button>
    </form>

    <section id="resultSection" class="mt-10 hidden bg-indigo-800/80 rounded-xl p-6 text-center shadow-lg shadow-indigo-900/40">
      <h2 class="text-2xl font-semibold mb-4 text-yellow-300">Your Daily Affirmation</h2>
      <p id="affirmationText" class="text-lg leading-relaxed max-w-lg mx-auto"></p>
      <button id="newAffirmationBtn" class="mt-6 inline-block bg-yellow-400 text-indigo-900 font-semibold px-5 py-2 rounded-lg hover:bg-yellow-300 transition-shadow shadow-md">Generate Another</button>
    </section>
  </main>

  <footer class="mt-14 text-indigo-300 text-center text-sm select-none max-w-xl mx-auto px-4">
    &copy; 2024 Affirmations Inc. Crafted to brighten your day 🌞
  </footer>

  <script>
    // Simple affirmation templates
    const templates = [
      (mood, goals) => `Today, though you feel ${mood}, you will channel your energy to ${goals} with confidence and calm.`,
      (mood, goals) => `Embrace your ${mood} feelings as a sign of growth and focus fully on your goal to ${goals}.`,
      (mood, goals) => `No matter the ${mood} you experience, your determination to ${goals} will turn challenges into victories.`,
      (mood, goals) => `Your mood of ${mood} is temporary; your drive to ${goals} is eternal. Keep moving forward with positivity.`,
      (mood, goals) => `Each step you take today toward ${goals} is powered by your ability to rise above feeling ${mood}.`,
      (mood, goals) => `You are stronger than your ${mood} moment. Today is perfect for you to achieve ${goals}.`,
      (mood, goals) => `Trust that feeling ${mood} now will make the achievement of ${goals} even sweeter.`,
      (mood, goals) => `Let the feeling of ${mood} remind you of your resilience as you pursue ${goals} with heart and mind.`,
      (mood, goals) => `Your authenticity in feeling ${mood} fuels your unique path to ${goals}. Today is yours to claim.`,
      (mood, goals) => `Wake up each morning knowing your ${mood} energy guides you wisely toward ${goals}.`
    ];

    const form = document.getElementById('affirmationForm');
    const resultSection = document.getElementById('resultSection');
    const affirmationText = document.getElementById('affirmationText');
    const newBtn = document.getElementById('newAffirmationBtn');

    function capitalize(str) {
      return str.trim().replace(/\b\w/g, c => c.toUpperCase());
    }

    function generateAffirmation(mood, goals) {
      // Pick a random template and generate
      const template = templates[Math.floor(Math.random() * templates.length)];
      return template(capitalize(mood), capitalize(goals));
    }

    form.addEventListener('submit', e => {
      e.preventDefault();

      const mood = form.mood.value.trim();
      const goals = form.goals.value.trim();
      const delivery = form.delivery.value;

      if (!mood || !goals || !delivery) {
        alert('Please fill out all fields.');
        return;
      }

      if (delivery !== 'here') {
        alert('Email and App notification delivery options are coming soon! For now, select "Display Here Instantly".');
        form.delivery.value = '';
        return;
      }

      const affirmation = generateAffirmation(mood, goals);

      affirmationText.textContent = affirmation;
      resultSection.classList.remove('hidden');
      form.classList.add('hidden');
      window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    });

    newBtn.addEventListener('click', () => {
      resultSection.classList.add('hidden');
      form.classList.remove('hidden');
      form.reset();
      form.mood.focus();
    });
  </script>
</body>
</html>
```

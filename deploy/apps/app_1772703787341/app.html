<!DOCTYPE html>
<html lang="en" class="bg-gray-50">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cooking Measurement Converter</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Custom scrollbar for better UX */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    ::-webkit-scrollbar-thumb {
      background-color: #9ca3af;
      border-radius: 4px;
    }
  </style>
</head>
<body class="min-h-screen flex flex-col">

  <header class="bg-white shadow-sm py-6">
    <div class="container mx-auto px-6 flex flex-col md:flex-row items-center justify-between gap-4">
      <h1 class="text-3xl font-extrabold text-indigo-600">CookConvert</h1>
      <p class="text-gray-600 max-w-xl text-center md:text-left">Convert cooking measurements instantly with ingredient-specific density adjustments. No more guesswork in the kitchen!</p>
    </div>
  </header>

  <main class="flex-grow container mx-auto px-6 py-12 flex flex-col items-center">
    <div class="bg-white max-w-3xl w-full rounded-lg shadow-lg p-8">
      <form id="converter-form" class="space-y-6" onsubmit="event.preventDefault()">
        <div>
          <label for="ingredient" class="block text-sm font-medium text-gray-700 mb-1">Ingredient</label>
          <select id="ingredient" name="ingredient" required class="w-full rounded-md border border-gray-300 px-4 py-2 text-gray-700 focus:outline-none focus:ring-2 focus:ring-indigo-500">
            <!-- Options added by JS -->
          </select>
          <p class="mt-1 text-xs text-gray-400">Density adjustment based on common ingredient densities.</p>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-3 gap-5">
          <div>
            <label for="input-value" class="block text-sm font-medium text-gray-700 mb-1">Value</label>
            <input
              id="input-value"
              type="number"
              min="0"
              step="any"
              placeholder="e.g. 1.5"
              required
              class="w-full rounded-md border border-gray-300 px-4 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500 text-gray-700"
            />
          </div>

          <div>
            <label for="input-unit" class="block text-sm font-medium text-gray-700 mb-1">From Unit</label>
            <select id="input-unit" required class="w-full rounded-md border border-gray-300 px-4 py-2 text-gray-700 focus:outline-none focus:ring-2 focus:ring-indigo-500">
              <option value="cup">Cup (US)</option>
              <option value="tablespoon">Tablespoon (US)</option>

              <option value="ounce">Ounce (Weight)</option>
              <option value="gram">Gram</option>
              <option value="milliliter">Milliliter</option>
            </select>
          </div>

          <div>
            <label for="output-unit" class="block text-sm font-medium text-gray-700 mb-1">To Unit</label>
            <select id="output-unit" required class="w-full rounded-md border border-gray-300 px-4 py-2 text-gray-700 focus:outline-none focus:ring-2 focus:ring-indigo-500">
              <option value="cup">Cup (US)</option>
              <option value="tablespoon">Tablespoon (US)</option>
              <option value="teaspoon">Teaspoon (US)</option>
              <option value="ounce">Ounce (Weight)</option>
              <option value="gram">Gram</option>
              <option value="milliliter">Milliliter</option>
            </select>

        </button>

  </footer>

  <script>
    /*
      This app converts cooking measurements with ingredient densities.
      The conversion process:
      1. Convert input measurement to a base unit (grams or milliliters).
      2. Use ingredient density (g/ml) to convert between volume and weight.
      3. Convert base unit to the target unit.

      Units handled:
      - Volume: cup, tablespoon, teaspoon, milliliter
      - Weight: ounce, gram

      Note:
      - 1 cup = 240 ml (US cup)
      - 1 tablespoon = 15 ml
      - 1 teaspoon = 5 ml
      - 1 ounce = 28.3495 grams
    */

    const ingredientDensities = {
      // Density in grams per milliliter (g/ml)
      "all-purpose flour": 0.53,
      "sugar (granulated)": 0.85,
      "brown sugar": 0.72,
      "butter": 0.95,
      "honey": 1.42,
      "olive oil": 0.92,
      "milk": 1.03,
      "water": 1.0,
      "salt": 1.2,
      "baking powder": 0.9,
      "cocoa powder": 0.6,
      "unsweetened chocolate": 1.3,
      "cream cheese": 1.0,
      "yogurt": 1.03,
      "cornstarch": 0.54,
      "rice": 0.85
    };

    // Populate ingredient dropdown dynamically with friendly names capitalized
    const ingredientSelect = document.getElementById("ingredient");
    for (const key of Object.keys(ingredientDensities)) {
      const option = document.createElement("option");
      option.value = key;
      option.textContent = key
        .split(/[\s()-]+/)
        .map(w => w.charAt(0).toUpperCase() + w.slice(1))
        .join(" ");
      ingredientSelect.appendChild(option);
    }

    // Volume units to milliliters conversion (US standard)
    const volumeToMilliliter = {
      cup: 240,
      tablespoon: 15,
      teaspoon: 5,
      milliliter: 1
    };

    // Weight units to grams conversion
    const weightToGram = {
      ounce: 28.3495,
      gram: 1
    };

    // Determine if unit is volume or weight:
    function isVolumeUnit(unit) {
      return unit === "cup" || unit === "tablespoon" || unit === "teaspoon" || unit === "milliliter";
    }

    function isWeightUnit(unit) {
      return unit === "ounce" || unit === "gram";
    }

    function roundResult(value) {
      // Round to max 4 decimals, trim trailing zeros
      return parseFloat(value.toFixed(4));
    }

    // Main conversion function:
    // Convert inputValue + inputUnit + ingredient -> outputUnit
    function convertMeasurement(inputValue, inputUnit, outputUnit, ingredient) {
      if (inputValue === 0) return 0;

      const density = ingredientDensities[ingredient];
      if (!density) return NaN;

      // Step 1: Convert input to base unit
      // For volume units: convert to ml
      // For weight units: convert to grams

      let baseInMl = null;
      let baseInGram = null;

      if (isVolumeUnit(inputUnit)) {
        baseInMl = inputValue * volumeToMilliliter[inputUnit];
        // If output is volume, output is ml-based
        // If output is weight, convert ml to grams using density
        baseInGram = baseInMl * density;
      } else if (isWeightUnit(inputUnit)) {
        baseInGram = inputValue * weightToGram[inputUnit];
        // If output is weight, direct conversion
        // If output is volume, convert grams to ml using density
        baseInMl = baseInGram / density;
      } else {
        return NaN;
      }

      // Step 2: Convert base to target unit

      let result;

      if (isVolumeUnit(outputUnit)) {
        // output in ml divided by volumeToMilliliter factor
        if (baseInMl === null) {
          // convert grams to ml
          baseInMl = baseInGram / density;
        }
        result = baseInMl / volumeToMilliliter[outputUnit];
      } else if (isWeightUnit(outputUnit)) {
        // output in grams divided by weightToGram factor
        if (baseInGram === null) {
          // convert ml to grams
          baseInGram = baseInMl * density;
        }
        result = baseInGram / weightToGram[outputUnit];
      } else {
        return NaN;
      }

      return result;
    }

    const form = document.getElementById("converter-form");
    const resultEl = document.getElementById("result");

    form.addEventListener("submit", () => {
      const ingredient = ingredientSelect.value;
      const inputValue = parseFloat(document.getElementById("input-value").value);
      const inputUnit = document.getElementById("input-unit").value;
      const outputUnit = document.getElementById("output-unit").value;

      if (isNaN(inputValue) || inputValue < 0) {
        resultEl.textContent = "Please enter a valid positive number.";
        resultEl.classList.remove("text-indigo-700");
        resultEl.classList.add("text-red-600");
        return;
      }

      if (inputUnit === outputUnit) {
        // Same units: just echo input
        resultEl.textContent = `${roundResult(inputValue)} ${formatUnit(inputUnit)}`;
        resultEl.classList.remove("text-red-600");
        resultEl.classList.add("text-indigo-700");
        return;
      }

      const outputValue = convertMeasurement(inputValue, inputUnit, outputUnit, ingredient);

      if (isNaN(outputValue)) {
        resultEl.textContent = "Conversion not available for selected ingredient/unit.";
        resultEl.classList.remove("text-indigo-700");
        resultEl.classList.add("text-red-600");
        return;
      }

      resultEl.textContent = `${roundResult(outputValue)} ${formatUnit(outputUnit)}`;
      resultEl.classList.remove("text-red-600");
      resultEl.classList.add("text-indigo-700");
    });

    // Friendly unit names with plural support:
    function formatUnit(unit) {
      switch (unit) {
        case "cup": return "cup" + pluralS();
        case "tablespoon": return "tablespoon" + pluralS();
        case "teaspoon": return "teaspoon" + pluralS();
        case "ounce": return "ounce" + pluralS();
        case "gram": return "gram" + pluralS();
        case "milliliter": return "milliliter" + pluralS();
        default: return unit;

      }

      function pluralS() {
        const val = parseFloat(document.getElementById("input-value").value);
        return val === 1 ? "" : "s";
      }
    }
  </script>

</body>
</html>
